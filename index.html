<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AETHER — Open World VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 100;
    }

    #title-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      pointer-events: all;
    }

    #title-screen h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 200;
      letter-spacing: 0.4em;
      color: #e8e0d0;
      text-transform: uppercase;
      margin-bottom: 0.3em;
    }

    #title-screen p {
      font-size: clamp(0.8rem, 2vw, 1rem);
      letter-spacing: 0.3em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    #enter-btn {
      background: transparent;
      border: 1px solid #e8e0d0;
      color: #e8e0d0;
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 0.85em 2.5em;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }

    #enter-btn:hover {
      background: #e8e0d0;
      color: #000;
    }

    .controls-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: #555;
      text-transform: uppercase;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      transition: opacity 1s;
    }

    #biome-label {
      position: fixed;
      top: 2rem;
      right: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: #888;
      text-transform: uppercase;
      z-index: 100;
      pointer-events: none;
    }

    #compass {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      z-index: 100;
      pointer-events: none;
    }

    #compass canvas {
      width: 100%;
      height: 100%;
      opacity: 0.6;
    }

    #minimap {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 120px;
      height: 120px;
      border: 1px solid #333;
      border-radius: 50%;
      overflow: hidden;
      z-index: 100;
      pointer-events: none;
      background: rgba(0,0,0,0.6);
    }

    #minimap canvas {
      width: 100%; height: 100%;
    }

    .crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none;
      z-index: 100;
    }

    .crosshair::before, .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.5);
    }
    .crosshair::before { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
    .crosshair::after  { height: 1px; width: 100%; top: 50%; transform: translateY(-50%); }

    #interact-prompt {
      position: fixed;
      bottom: 35%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      color: #e8e0d0;
      text-transform: uppercase;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #time-display {
      position: fixed;
      top: 2rem;
      left: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: #666;
      text-transform: uppercase;
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- Title Screen -->
<div id="title-screen">
  <h1>Aether</h1>
  <p>An open world — infinite horizon</p>
  <button id="enter-btn" onclick="enterWorld()">Enter World</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="time-display">Dawn</div>
  <div id="biome-label">Plains</div>
  <div class="crosshair"></div>
  <div id="interact-prompt">[ E ] Interact</div>
  <div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>
</div>

<div class="controls-hint" id="controls-hint">
  WASD / Arrow keys — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; Click — Interact &nbsp;|&nbsp; V — VR Mode
</div>

<!-- A-FRAME SCENE -->
<a-scene
  id="main-scene"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  fog="type: exponential; color: #b8d4e8; density: 0.006"
  vr-mode-ui="enabled: true"
  loading-screen="backgroundColor: black; dotsColor: white"
>
  <!-- Assets -->
  <a-assets>
    <a-mixin id="tree-trunk" geometry="primitive: cylinder; height: 1.8; radiusTop: 0.1; radiusBottom: 0.18" material="color: #5a3e28; roughness: 0.9"></a-mixin>
    <a-mixin id="tree-leaves" geometry="primitive: cone; height: 2.2; radiusBottom: 1.0" material="color: #2d5a27; roughness: 0.8; metalness: 0"></a-mixin>
    <a-mixin id="rock" geometry="primitive: dodecahedron; radius: 0.5" material="color: #8a8070; roughness: 0.95; metalness: 0.05"></a-mixin>
  </a-assets>

  <!-- SKY SYSTEM — gradient dome effect -->
  <a-sky id="sky" color="#87b5d8"></a-sky>

  <!-- SUN -->
  <a-entity id="sun-entity" position="80 60 -100">
    <a-sphere radius="8" material="color: #fff8e0; emissive: #fff5cc; emissiveIntensity: 0.4; roughness: 1; metalness: 0"></a-sphere>
    <a-light type="directional" id="sun-light" color="#fffce0" intensity="1.2" cast-shadow="true" shadow-map-width="2048" shadow-map-height="2048"></a-light>
  </a-entity>

  <!-- AMBIENT LIGHT -->
  <a-light type="ambient" color="#c8d8f0" intensity="0.5"></a-light>
  <a-light type="hemisphere" color="#d0e8ff" ground-color="#6b8c5e" intensity="0.4"></a-light>

  <!-- TERRAIN — large flat ground with subtle color bands -->
  <a-plane id="ground"
    position="0 0 0"
    rotation="-90 0 0"
    width="800" height="800"
    material="color: #5e7a4a; roughness: 0.95; metalness: 0"
    shadow="receive: true">
  </a-plane>

  <!-- Ground texture detail patches -->
  <a-entity id="ground-patches"></a-entity>

  <!-- WATER BODY — lake -->
  <a-circle id="lake"
    position="-60 0.05 -80"
    rotation="-90 0 0"
    radius="28"
    material="color: #3d7db8; roughness: 0.1; metalness: 0.3; opacity: 0.85; transparent: true">
  </a-circle>
  <!-- Lake shore ring -->
  <a-torus position="-60 0.04 -80" rotation="-90 0 0" radius="28" radius-tubular="1.5"
    material="color: #8aac60; roughness: 0.9"></a-torus>

  <!-- MOUNTAIN RANGE — far background -->
  <a-entity id="mountains"></a-entity>

  <!-- FOREST CLUSTER 1 — northeast -->
  <a-entity id="forest-ne" position="40 0 -50"></a-entity>

  <!-- FOREST CLUSTER 2 — west -->
  <a-entity id="forest-w" position="-80 0 -20"></a-entity>

  <!-- ANCIENT MONOLITH — center landmark -->
  <a-entity id="monolith" position="0 0 -30" animation="property: rotation; to: 0 360 0; loop: true; dur: 120000; easing: linear">
    <!-- Hidden inner glow -->
  </a-entity>

  <!-- STONE RUINS -->
  <a-entity id="ruins" position="20 0 -45"></a-entity>

  <!-- FLOATING CRYSTALS — magical elements -->
  <a-entity id="crystals"></a-entity>

  <!-- GRASS PATCHES (instanced visual) -->
  <a-entity id="grass-field"></a-entity>

  <!-- CAMPFIRE -->
  <a-entity id="campfire" position="-8 0 -12"></a-entity>

  <!-- PLAYER CAMERA RIG -->
  <a-entity id="rig" position="0 0 15">
    <a-camera id="player-camera"
      wasd-controls="acceleration: 20; fly: false"
      look-controls="pointerLockEnabled: true"
      position="0 1.7 0"
      far="600"
      near="0.05">
    </a-camera>
  </a-entity>

</a-scene>

<script>
// ─── WORLD BUILDER ───────────────────────────────────────────────────────────

function buildWorld() {
  buildMountains();
  buildForestNE();
  buildForestW();
  buildMonolith();
  buildRuins();
  buildCrystals();
  buildCampfire();
  buildGroundPatches();
  buildGrass();
  startDayCycle();
  startMinimapLoop();
}

// ─── MOUNTAINS ───────────────────────────────────────────────────────────────
function buildMountains() {
  const el = document.getElementById('mountains');
  const peaks = [
    { x: -200, z: -280, h: 90, r: 55, c: '#7a8fa0' },
    { x: -130, z: -300, h: 110, r: 65, c: '#6e8494' },
    { x: -50,  z: -320, h: 130, r: 70, c: '#687c8e' },
    { x:  40,  z: -310, h: 100, r: 60, c: '#748898' },
    { x: 120,  z: -290, h: 85,  r: 50, c: '#7a8fa0' },
    { x: 200,  z: -270, h: 95,  r: 58, c: '#6e8494' },
    { x: 260,  z: -260, h: 75,  r: 45, c: '#7a8fa0' },
    { x: -260, z: -260, h: 70,  r: 43, c: '#7a8fa0' },
  ];
  peaks.forEach(p => {
    const cone = document.createElement('a-cone');
    cone.setAttribute('position', `${p.x} ${p.h/2 - 0.5} ${p.z}`);
    cone.setAttribute('height', p.h);
    cone.setAttribute('radius-bottom', p.r);
    cone.setAttribute('radius-top', 0);
    cone.setAttribute('material', `color: ${p.c}; roughness: 0.9; metalness: 0.05`);
    cone.setAttribute('shadow', 'cast: true; receive: true');
    el.appendChild(cone);

    // Snow cap
    const snow = document.createElement('a-cone');
    snow.setAttribute('position', `${p.x} ${p.h - 8} ${p.z}`);
    snow.setAttribute('height', 18);
    snow.setAttribute('radius-bottom', p.r * 0.22);
    snow.setAttribute('radius-top', 0);
    snow.setAttribute('material', 'color: #f0f4f8; roughness: 1; metalness: 0');
    el.appendChild(snow);
  });
}

// ─── TREE HELPER ─────────────────────────────────────────────────────────────
function makeTree(parent, x, z, scale = 1, variant = 0) {
  const treeEl = document.createElement('a-entity');
  treeEl.setAttribute('position', `${x} 0 ${z}`);

  const colors = ['#2d5a27', '#3a6b2e', '#245220', '#4a7035'];
  const trunkColors = ['#5a3e28', '#4e3420', '#624530'];
  const lc = colors[variant % colors.length];
  const tc = trunkColors[variant % trunkColors.length];
  const h = (1.6 + Math.random() * 0.8) * scale;

  const trunk = document.createElement('a-cylinder');
  trunk.setAttribute('position', `0 ${h * 0.4} 0`);
  trunk.setAttribute('height', h * 0.8);
  trunk.setAttribute('radius', 0.12 * scale);
  trunk.setAttribute('material', `color: ${tc}; roughness: 0.95`);
  trunk.setAttribute('shadow', 'cast: true');

  const crown = document.createElement('a-cone');
  crown.setAttribute('position', `0 ${h * 0.8 + h * 0.5} 0`);
  crown.setAttribute('height', h * 1.1);
  crown.setAttribute('radius-bottom', 0.9 * scale);
  crown.setAttribute('material', `color: ${lc}; roughness: 0.85`);
  crown.setAttribute('shadow', 'cast: true');

  // Second smaller cone on top
  const crown2 = document.createElement('a-cone');
  crown2.setAttribute('position', `0 ${h * 0.8 + h * 1.0} 0`);
  crown2.setAttribute('height', h * 0.75);
  crown2.setAttribute('radius-bottom', 0.58 * scale);
  crown2.setAttribute('material', `color: ${lc}; roughness: 0.85`);

  treeEl.appendChild(trunk);
  treeEl.appendChild(crown);
  treeEl.appendChild(crown2);
  parent.appendChild(treeEl);
}

// ─── FORESTS ─────────────────────────────────────────────────────────────────
function buildForestNE() {
  const el = document.getElementById('forest-ne');
  const positions = [];
  for (let i = 0; i < 55; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 35;
    positions.push({ x: Math.cos(angle) * r, z: Math.sin(angle) * r });
  }
  positions.forEach((p, i) => makeTree(el, p.x, p.z, 0.7 + Math.random() * 0.6, i));
}

function buildForestW() {
  const el = document.getElementById('forest-w');
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 5 + Math.random() * 28;
    makeTree(el, Math.cos(angle) * r, Math.sin(angle) * r, 0.8 + Math.random() * 0.5, i);
  }
}

// ─── MONOLITH ────────────────────────────────────────────────────────────────
function buildMonolith() {
  // Reset outer rotation — use a static parent
  const outer = document.getElementById('monolith');
  outer.removeAttribute('animation');

  const base = document.createElement('a-entity');
  base.setAttribute('position', '0 0 -30');
  document.querySelector('a-scene').appendChild(base);

  // Stone platform
  const platform = document.createElement('a-cylinder');
  platform.setAttribute('position', '0 0.15 0');
  platform.setAttribute('height', '0.3');
  platform.setAttribute('radius', '4');
  platform.setAttribute('material', 'color: #7a7060; roughness: 0.95');
  platform.setAttribute('shadow', 'receive: true');
  base.appendChild(platform);

  // Stone ring
  const ring = document.createElement('a-torus');
  ring.setAttribute('position', '0 0.3 0');
  ring.setAttribute('rotation', '-90 0 0');
  ring.setAttribute('radius', '3.5');
  ring.setAttribute('radius-tubular', '0.12');
  ring.setAttribute('material', 'color: #6a6050; roughness: 0.95');
  base.appendChild(ring);

  // Central monolith pillar
  const pillar = document.createElement('a-box');
  pillar.setAttribute('position', '0 4 0');
  pillar.setAttribute('width', '1.2');
  pillar.setAttribute('height', '8');
  pillar.setAttribute('depth', '0.5');
  pillar.setAttribute('material', 'color: #3a3530; roughness: 0.9; metalness: 0.1');
  pillar.setAttribute('shadow', 'cast: true');
  base.appendChild(pillar);

  // Glowing rune on pillar
  const rune = document.createElement('a-plane');
  rune.setAttribute('position', '0 4 0.26');
  rune.setAttribute('width', '0.8');
  rune.setAttribute('height', '5');
  rune.setAttribute('material', 'color: #7ab8d4; emissive: #4a90c0; emissiveIntensity: 0.6; roughness: 1; opacity: 0.9; transparent: true');
  rune.setAttribute('animation', 'property: material.emissiveIntensity; from: 0.3; to: 0.9; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine');
  base.appendChild(rune);

  // Glowing light at base
  const glow = document.createElement('a-light');
  glow.setAttribute('type', 'point');
  glow.setAttribute('position', '0 1 0');
  glow.setAttribute('color', '#7ab8d4');
  glow.setAttribute('intensity', '0.8');
  glow.setAttribute('distance', '18');
  base.appendChild(glow);

  // Orbiting crystal rings
  for (let ring = 0; ring < 3; ring++) {
    const orbitEl = document.createElement('a-entity');
    orbitEl.setAttribute('position', '0 2 + ' + (ring * 2) + ' 0');
    orbitEl.setAttribute('animation', `property: rotation; to: 0 360 0; loop: true; dur: ${6000 + ring * 2000}; easing: linear`);
    const orb = document.createElement('a-sphere');
    orb.setAttribute('position', `${2 + ring * 0.5} ${4 + ring * 1.2} 0`);
    orb.setAttribute('radius', '0.15');
    orb.setAttribute('material', `color: #a0d0e8; emissive: #60a8cc; emissiveIntensity: 0.8; roughness: 0.2`);
    orbitEl.appendChild(orb);
    base.appendChild(orbitEl);
  }

  // Remove empty outer entity
  outer.parentNode.removeChild(outer);
}

// ─── STONE RUINS ─────────────────────────────────────────────────────────────
function buildRuins() {
  const el = document.getElementById('ruins');
  const mc = '#8a8070';
  const positions = [
    [0, 0], [4, 0], [8, 0], [0, 4], [8, 4],
    [0, 8], [4, 8], [8, 8]
  ];
  positions.forEach(([x, z], i) => {
    const wall = document.createElement('a-box');
    const h = 1 + Math.random() * 2.5;
    const broken = Math.random() > 0.5;
    wall.setAttribute('position', `${x} ${h / 2} ${z}`);
    wall.setAttribute('width', broken ? (0.5 + Math.random() * 1.0) : 1.2);
    wall.setAttribute('height', h);
    wall.setAttribute('depth', broken ? (0.5 + Math.random() * 0.8) : 1.2);
    wall.setAttribute('material', `color: ${mc}; roughness: 0.95`);
    wall.setAttribute('rotation', `0 ${Math.random() * 8 - 4} 0`);
    wall.setAttribute('shadow', 'cast: true; receive: true');
    el.appendChild(wall);
  });

  // Fallen arch
  const archH = document.createElement('a-box');
  archH.setAttribute('position', '4 2.2 0');
  archH.setAttribute('width', '5');
  archH.setAttribute('height', '0.4');
  archH.setAttribute('depth', '0.7');
  archH.setAttribute('rotation', '0 0 12');
  archH.setAttribute('material', `color: ${mc}; roughness: 0.95`);
  archH.setAttribute('shadow', 'cast: true; receive: true');
  el.appendChild(archH);

  // Scattered rocks
  for (let i = 0; i < 12; i++) {
    const rock = document.createElement('a-dodecahedron');
    rock.setAttribute('radius', 0.15 + Math.random() * 0.4);
    rock.setAttribute('position', `${-2 + Math.random() * 12} 0.2 ${-2 + Math.random() * 12}`);
    rock.setAttribute('rotation', `${Math.random()*30} ${Math.random()*360} ${Math.random()*30}`);
    rock.setAttribute('material', `color: ${mc}; roughness: 0.95`);
    rock.setAttribute('shadow', 'cast: true');
    el.appendChild(rock);
  }
}

// ─── FLOATING CRYSTALS ───────────────────────────────────────────────────────
function buildCrystals() {
  const el = document.getElementById('crystals');
  const configs = [
    { x: -30, y: 3, z: -15, c: '#d4a0e0', e: '#b060c0' },
    { x: -35, y: 5, z: -18, c: '#a0c8e0', e: '#5090b8' },
    { x: -28, y: 4, z: -20, c: '#e8c080', e: '#c08820' },
    { x: 50, y: 6, z: -60, c: '#80e0a0', e: '#30b060' },
    { x: 55, y: 4, z: -55, c: '#e0a080', e: '#c06040' },
  ];
  configs.forEach((cfg, i) => {
    const crystalEl = document.createElement('a-entity');
    crystalEl.setAttribute('position', `${cfg.x} ${cfg.y} ${cfg.z}`);
    crystalEl.setAttribute('animation', `property: position; to: ${cfg.x} ${cfg.y + 0.6} ${cfg.z}; dir: alternate; loop: true; dur: ${3000 + i * 500}; easing: easeInOutSine`);
    crystalEl.setAttribute('animation__rot', `property: rotation; to: 0 360 0; loop: true; dur: ${10000 + i * 2000}; easing: linear`);

    const crystal = document.createElement('a-cone');
    crystal.setAttribute('height', '1.2');
    crystal.setAttribute('radius-bottom', '0.25');
    crystal.setAttribute('radius-top', '0');
    crystal.setAttribute('material', `color: ${cfg.c}; emissive: ${cfg.e}; emissiveIntensity: 0.6; roughness: 0.1; metalness: 0.3; opacity: 0.85; transparent: true`);

    const crystalInv = document.createElement('a-cone');
    crystalInv.setAttribute('position', '0 -0.9 0');
    crystalInv.setAttribute('height', '0.8');
    crystalInv.setAttribute('radius-bottom', '0');
    crystalInv.setAttribute('radius-top', '0.2');
    crystalInv.setAttribute('rotation', '180 0 0');
    crystalInv.setAttribute('material', `color: ${cfg.c}; emissive: ${cfg.e}; emissiveIntensity: 0.5; roughness: 0.1; metalness: 0.3; opacity: 0.75; transparent: true`);

    const light = document.createElement('a-light');
    light.setAttribute('type', 'point');
    light.setAttribute('color', cfg.c);
    light.setAttribute('intensity', '0.5');
    light.setAttribute('distance', '10');

    crystalEl.appendChild(crystal);
    crystalEl.appendChild(crystalInv);
    crystalEl.appendChild(light);
    el.appendChild(crystalEl);
  });
}

// ─── CAMPFIRE ────────────────────────────────────────────────────────────────
function buildCampfire() {
  const el = document.getElementById('campfire');

  // Log circle
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2;
    const log = document.createElement('a-cylinder');
    log.setAttribute('position', `${Math.cos(angle) * 0.6} 0.08 ${Math.sin(angle) * 0.6}`);
    log.setAttribute('height', '0.16');
    log.setAttribute('radius', '0.08');
    log.setAttribute('rotation', `0 ${(angle * 180 / Math.PI) + 90} 0`);
    log.setAttribute('material', 'color: #4a2e18; roughness: 1');
    el.appendChild(log);
  }

  // Flame — animated cone
  const flame1 = document.createElement('a-cone');
  flame1.setAttribute('position', '0 0.5 0');
  flame1.setAttribute('height', '0.8');
  flame1.setAttribute('radius-bottom', '0.2');
  flame1.setAttribute('radius-top', '0.0');
  flame1.setAttribute('material', 'color: #ff8800; emissive: #ff6600; emissiveIntensity: 0.8; roughness: 1; opacity: 0.9; transparent: true');
  flame1.setAttribute('animation', 'property: scale; from: 1 1 1; to: 0.85 1.2 0.85; dir: alternate; loop: true; dur: 400; easing: easeInOutSine');
  el.appendChild(flame1);

  const flame2 = document.createElement('a-cone');
  flame2.setAttribute('position', '0.05 0.4 0.05');
  flame2.setAttribute('height', '0.5');
  flame2.setAttribute('radius-bottom', '0.12');
  flame2.setAttribute('radius-top', '0.0');
  flame2.setAttribute('material', 'color: #ffcc00; emissive: #ffaa00; emissiveIntensity: 0.9; roughness: 1; opacity: 0.85; transparent: true');
  flame2.setAttribute('animation', 'property: scale; from: 1 1 1; to: 1.1 0.9 1.1; dir: alternate; loop: true; dur: 330; easing: easeInOutSine');
  el.appendChild(flame2);

  // Fire light
  const fireLight = document.createElement('a-light');
  fireLight.setAttribute('type', 'point');
  fireLight.setAttribute('position', '0 0.8 0');
  fireLight.setAttribute('color', '#ff8820');
  fireLight.setAttribute('intensity', '1.5');
  fireLight.setAttribute('distance', '20');
  fireLight.setAttribute('animation', 'property: intensity; from: 1.2; to: 2.0; dir: alternate; loop: true; dur: 300; easing: easeInOutSine');
  el.appendChild(fireLight);

  // Stone ring around fire
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const stone = document.createElement('a-sphere');
    stone.setAttribute('position', `${Math.cos(angle) * 0.85} 0.15 ${Math.sin(angle) * 0.85}`);
    stone.setAttribute('radius', '0.14');
    stone.setAttribute('material', 'color: #6a6050; roughness: 0.95');
    el.appendChild(stone);
  }
}

// ─── GROUND PATCHES ──────────────────────────────────────────────────────────
function buildGroundPatches() {
  const el = document.getElementById('ground-patches');
  const patches = [
    { x: 5, z: -5, r: 8, c: '#4a6838' },
    { x: -15, z: 8, r: 6, c: '#6a8848' },
    { x: 25, z: -20, r: 10, c: '#527040' },
    { x: -25, z: -35, r: 7, c: '#4e6e3a' },
    { x: 10, z: 5, r: 5, c: '#628048' },
  ];
  patches.forEach(p => {
    const patch = document.createElement('a-circle');
    patch.setAttribute('position', `${p.x} 0.01 ${p.z}`);
    patch.setAttribute('rotation', '-90 0 0');
    patch.setAttribute('radius', p.r);
    patch.setAttribute('material', `color: ${p.c}; roughness: 0.95`);
    el.appendChild(patch);
  });
}

// ─── GRASS ───────────────────────────────────────────────────────────────────
function buildGrass() {
  const el = document.getElementById('grass-field');
  for (let i = 0; i < 200; i++) {
    const x = (Math.random() - 0.5) * 120;
    const z = (Math.random() - 0.5) * 120;
    if (Math.abs(x) < 3 && Math.abs(z) < 5) continue; // avoid player start

    const blade = document.createElement('a-plane');
    blade.setAttribute('position', `${x} 0.2 ${z}`);
    blade.setAttribute('width', '0.08');
    blade.setAttribute('height', '0.4');
    blade.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
    blade.setAttribute('material', `color: ${Math.random() > 0.5 ? '#4e7a32' : '#587c38'}; roughness: 1; side: double`);
    el.appendChild(blade);
  }
}

// ─── DAY/NIGHT CYCLE ─────────────────────────────────────────────────────────
const DAY_DURATION = 180000; // 3 min full cycle
let dayStart = Date.now();

const skyColors = [
  { t: 0.0, sky: '#1a1a2e', fog: '#1a1a2e', label: 'Midnight', ambient: '#202040' },
  { t: 0.2, sky: '#c4723a', fog: '#c4784a', label: 'Dawn', ambient: '#c05030' },
  { t: 0.3, sky: '#87b5d8', fog: '#b8d4e8', label: 'Morning', ambient: '#c8d8f0' },
  { t: 0.5, sky: '#5a9fd4', fog: '#a0c8e0', label: 'Noon', ambient: '#d0e8ff' },
  { t: 0.7, sky: '#87b5d8', fog: '#b8d4e8', label: 'Afternoon', ambient: '#c8d8f0' },
  { t: 0.85, sky: '#e07030', fog: '#d06840', label: 'Dusk', ambient: '#c06030' },
  { t: 0.95, sky: '#1a1a2e', fog: '#1a1a2e', label: 'Night', ambient: '#202040' },
  { t: 1.0, sky: '#1a1a2e', fog: '#1a1a2e', label: 'Midnight', ambient: '#202040' },
];

function lerpColor(c1, c2, t) {
  const p = (h) => parseInt(h.slice(1), 16);
  const r1 = (p(c1) >> 16) & 0xff, g1 = (p(c1) >> 8) & 0xff, b1 = p(c1) & 0xff;
  const r2 = (p(c2) >> 16) & 0xff, g2 = (p(c2) >> 8) & 0xff, b2 = p(c2) & 0xff;
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function startDayCycle() {
  const sky = document.getElementById('sky');
  const scene = document.querySelector('a-scene');
  const timeDisplay = document.getElementById('time-display');

  setInterval(() => {
    const elapsed = (Date.now() - dayStart) % DAY_DURATION;
    const t = elapsed / DAY_DURATION;

    let seg = skyColors[skyColors.length - 2];
    let nextSeg = skyColors[skyColors.length - 1];
    for (let i = 0; i < skyColors.length - 1; i++) {
      if (t >= skyColors[i].t && t < skyColors[i + 1].t) {
        seg = skyColors[i];
        nextSeg = skyColors[i + 1];
        break;
      }
    }
    const segT = (t - seg.t) / (nextSeg.t - seg.t);
    const skyC = lerpColor(seg.sky, nextSeg.sky, segT);
    const fogC = lerpColor(seg.fog, nextSeg.fog, segT);

    if (sky) sky.setAttribute('color', skyC);
    if (scene) scene.setAttribute('fog', `type: exponential; color: ${fogC}; density: 0.006`);
    timeDisplay.textContent = seg.label;

    // Move sun
    const sunAngle = t * Math.PI * 2 - Math.PI / 2;
    const sunEl = document.getElementById('sun-entity');
    if (sunEl) {
      sunEl.setAttribute('position', `${Math.cos(sunAngle) * 120} ${Math.sin(sunAngle) * 80 + 20} -100`);
    }
  }, 500);
}

// ─── MINIMAP ──────────────────────────────────────────────────────────────────
function startMinimapLoop() {
  const canvas = document.getElementById('minimap-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = 120, H = 120, scale = 120 / 200;

  function drawMinimap() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(0,0,0,0.0)';
    ctx.fillRect(0, 0, W, H);

    const worldToMap = (wx, wz) => ({
      x: W / 2 + wx * scale,
      y: H / 2 + wz * scale
    });

    // Lake
    ctx.beginPath();
    const lk = worldToMap(-60, -80);
    ctx.arc(lk.x, lk.y, 28 * scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(60, 120, 180, 0.7)';
    ctx.fill();

    // Forest NE
    ctx.beginPath();
    const fn = worldToMap(40, -50);
    ctx.arc(fn.x, fn.y, 35 * scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(40, 90, 35, 0.6)';
    ctx.fill();

    // Forest W
    ctx.beginPath();
    const fw = worldToMap(-80, -20);
    ctx.arc(fw.x, fw.y, 28 * scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(40, 90, 35, 0.6)';
    ctx.fill();

    // Monolith
    const mn = worldToMap(0, -30);
    ctx.beginPath();
    ctx.arc(mn.x, mn.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(120, 180, 210, 0.9)';
    ctx.fill();

    // Campfire
    const cf = worldToMap(-8, -12);
    ctx.beginPath();
    ctx.arc(cf.x, cf.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 140, 30, 0.9)';
    ctx.fill();

    // Player position
    const rig = document.getElementById('rig');
    if (rig) {
      const pos = rig.getAttribute('position');
      if (pos) {
        const pp = worldToMap(pos.x, pos.z);
        ctx.beginPath();
        ctx.arc(pp.x, pp.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = '#e8e0d0';
        ctx.fill();

        // Player direction indicator
        const cam = document.getElementById('player-camera');
        if (cam) {
          const rot = cam.getAttribute('rotation');
          if (rot) {
            const angle = (-rot.y + 180) * Math.PI / 180;
            ctx.beginPath();
            ctx.moveTo(pp.x, pp.y);
            ctx.lineTo(pp.x + Math.sin(angle) * 8, pp.y + Math.cos(angle) * 8);
            ctx.strokeStyle = '#e8e0d0';
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
        }
      }
    }
  }

  setInterval(drawMinimap, 100);
}

// ─── ENTER WORLD ─────────────────────────────────────────────────────────────
function enterWorld() {
  const ts = document.getElementById('title-screen');
  ts.style.transition = 'opacity 1.2s';
  ts.style.opacity = '0';
  setTimeout(() => { ts.style.display = 'none'; }, 1200);

  setTimeout(() => {
    const hint = document.getElementById('controls-hint');
    if (hint) {
      hint.style.opacity = '0';
    }
  }, 6000);

  // Lock pointer on scene click
  document.querySelector('a-scene').addEventListener('click', () => {
    document.querySelector('a-scene').canvas.requestPointerLock();
  });
}

// ─── BIOME DETECTION ─────────────────────────────────────────────────────────
setInterval(() => {
  const rig = document.getElementById('rig');
  const label = document.getElementById('biome-label');
  if (!rig || !label) return;
  const pos = rig.getAttribute('position');
  if (!pos) return;
  const { x, z } = pos;
  const dist = (ax, az) => Math.sqrt((x - ax) ** 2 + (z - az) ** 2);

  let biome = 'Open Plains';
  if (dist(-60, -80) < 35) biome = 'Lakeside';
  else if (dist(40, -50) < 40) biome = 'Ancient Forest';
  else if (dist(-80, -20) < 35) biome = 'Whispering Woods';
  else if (dist(0, -30) < 20) biome = 'Sacred Grounds';
  else if (dist(20, -45) < 20) biome = 'Ruins';
  else if (dist(-8, -12) < 12) biome = 'Campfire';
  else if (dist(-30, -17) < 15) biome = 'Crystal Grove';
  else if (Math.min(dist(-200, -290), dist(0, -320), dist(200, -270)) < 80) biome = 'Mountain Pass';

  label.textContent = biome;
}, 500);

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.querySelector('a-scene').addEventListener('loaded', () => {
  buildWorld();
});

// V key for VR toggle hint
document.addEventListener('keydown', e => {
  if (e.key === 'v' || e.key === 'V') {
    const scene = document.querySelector('a-scene');
    if (scene.is('vr-mode')) scene.exitVR();
    else scene.enterVR();
  }
});
</script>
